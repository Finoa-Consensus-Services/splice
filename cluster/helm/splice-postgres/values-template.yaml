# DEPRECATED: This chart is unsupported after 2026-11-12, the PostgreSQL 14
# end-of-life date. A newer PostgreSQL major version does not start on this
# chart's data directory, so do not bump imageName; migrate to an externally
# provisioned PostgreSQL instead. See
# https://docs.canton.network/global-synchronizer/production-operations/validator-postgres-migration

imageRepo: "ghcr.io/digital-asset/decentralized-canton-sync/docker"
imageName: "postgres:14"

resources:
  limits:
    memory: 12Gi
  requests:
    cpu: "0.5"
    memory: 1Gi

# Custom annotations and labels for deployed resources
pod:
  annotations: {}
  labels: {}

db:
  volumeSize: 2800Gi
  volumeStorageClass: standard-rwo
  pvcTemplateName: pg-data
  maxConnections: 300
  maxWalSize: 2GB

# Extra PostgreSQL command-line arguments (optional)
# extraArgs:
#   - "-c"
#   - "shared_buffers=256MB"
#   - "-c"
#   - "wal_buffers=-1"

persistence:
  secretName: "postgres-secrets"
#  secretOverrides:
#    postgresPassword: ""
# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:

# k8s tolerations for all deployed pods (optional)
# tolerations:

securityContexts:
  pod:
    security_context_profile: pod_security_context
    fsGroup: 999
    fsGroupChangePolicy: "OnRootMismatch"
  containers:
    postgres:
      security_context_profile: app_security_context
      runAsUser: 999
      runAsGroup: 999
