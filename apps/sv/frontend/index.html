<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
         `Lato:wght@400;700` added alongside Inter/Source Code Pro: `tokens.md`
         documents `font-section: Lato` (section headings, table headers/cells)
         and it's already referenced via `fontFamily: 'Lato'` in
         ProposalVoteForm.tsx and SelectAction.tsx, but was never actually
         loaded here — every existing Lato usage was silently falling back to
         the browser's default sans-serif font.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Lato:wght@400;700&family=Source+Code+Pro:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!--
         Frontend configuration. Not part of the bundled application code,
         so that operators can change the config without having to rebuild
         the application.
    -->
    <script src="/config.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
